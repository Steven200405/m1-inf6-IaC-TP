- name: Configurer le serveur web nginx
  hosts: all
  become: yes
  tasks:
    - name: Installer Nginx et MAJ Cache
      ansible.builtin.apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Démarrer le service Nginx
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: yes